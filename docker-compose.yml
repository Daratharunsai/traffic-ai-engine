version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic-ai-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: traffic-ai-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    depends_on:
      - api
